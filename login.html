<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Solar Abyss</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-light d-flex flex-column" style="min-height: 100vh;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent sticky-top shadow-none">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase tracking-wider"
                style="font-family: 'Space Grotesk', sans-serif;" href="index.html">
                <span class="text-primary">Solar Abyss</span> Esports
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="detail.html">Details</a></li>
                    <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-primary rounded-pill px-4 active" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-5 col-lg-4">
                    <div class="card bg-dark border-secondary p-4 rounded-4 shadow-lg">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-uppercase text-white"
                                style="font-family: 'Space Grotesk', sans-serif;">
                                Welcome <span class="text-primary">Back</span>
                            </h2>
                            <p class="text-white small">Note: This page is just for UI purposes + Project Requirements.
                                No info is saved.</p>
                        </div>
                        <form>
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label small fw-bold text-uppercase text-white">Email
                                    Address</label>
                                <input type="email" class="form-control bg-black text-white border-secondary py-2"
                                    id="loginEmail" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword"
                                    class="form-label small fw-bold text-uppercase text-white">Password</label>
                                <input type="password" class="form-control bg-black text-white border-secondary py-2"
                                    id="loginPassword" placeholder="••••••••">
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label small text-white" for="rememberMe">Remember
                                        me</label>
                                </div>
                                <a href="#" class="text-primary small text-decoration-none hover-underline">Forgot
                                    password?</a>
                            </div>
                            <button type="submit"
                                class="btn btn-primary w-100 py-2 rounded-pill fw-bold text-uppercase tracking-wider mb-3">Login</button>
                            <div class="text-center">
                                <p class="small mb-0 text-white">Don't have an account? <a href="#"
                                        class="text-primary text-decoration-none">Sign Up</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-black border-top border-secondary">
        <div class="container text-center">
            <p class="text-white small mb-1">&copy; Justin Martir 2026</p>
            <p class="text-white small mb-0">Created for CIS 3110. Responsive Website using Bootstrap 5</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
